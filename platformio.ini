[env:lilygo-t2-can]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_port = COM3
monitor_port = COM3
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_upload.flash_size = 8MB
board_build.partitions = default_8MB.csv
build_flags =
    -I.
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=0
    -g
    ; Pin async_tcp task to Core 1 so it doesn't starve the Core 0 idle task (WDT target)
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=1
    ; Lower priority so it can't starve other tasks on Core 1
    -DCONFIG_ASYNC_TCP_PRIORITY=5
    ; Enable WDT feeding inside the async_tcp task loop
    -DCONFIG_ASYNC_TCP_USE_WDT=1
lib_deps =
    https://github.com/ESP32Async/ESPAsyncWebServer.git
    https://github.com/ESP32Async/AsyncTCP.git
    knolleary/PubSubClient @ ^2.8
    olikraus/U8g2 @ ^2.35.19
    https://github.com/autowp/arduino-mcp2515.git
